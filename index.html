<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jovial Moons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap">
  <style>
    :root {
      --bg: #0a0a0f;
      --text: #f5f5f5;
      --accent: #d4af37;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system_ui, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    .hero {
      position: relative;
      height: 100vh;
      min-height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
    }
    
    .hero-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.95;
    }
    
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(10, 10, 15, 0.35) 0%,
        rgba(10, 10, 15, 0.55) 50%,
        rgba(10, 10, 15, 0.75) 100%
      );
    }
    
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      max-width: 720px;
    }

    /* Keep text hidden until the web fonts are ready, then fade it in.
       This prevents the jarring font-swap "jitter" on initial load. */
    .logo,
    .tagline,
    .about h2,
    .about p {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .fonts-ready .logo,
    .fonts-ready .tagline,
    .fonts-ready .about h2,
    .fonts-ready .about p {
      opacity: 1;
    }

    /* The .tagline and .about p define their own resting opacity, so restore it. */
    .fonts-ready .tagline { opacity: 0.85; }
    .fonts-ready .about p { opacity: 0.85; }
    
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 4.2rem;
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 1.25rem;
      color: #fff;
      text-shadow: 0 2px 30px rgba(0, 0, 0, 0.6);
    }
    
    .tagline {
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 3rem;
    }
    
    .section {
      padding: 120px 24px;
      max-width: 1080px;
      margin: 0 auto;
    }
    
    .about {
      text-align: center;
    }
    
    .about h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 400;
      margin-bottom: 2rem;
      letter-spacing: -0.5px;
    }
    
    .about p {
      font-size: 1.1rem;
      max-width: 620px;
      margin: 0 auto;
      opacity: 0.85;
      line-height: 1.75;
    }
    
    .footer {
      padding: 60px 24px 40px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.875rem;
      opacity: 0.6;
    }
    
    @media (max-width: 768px) {
      .logo {
        font-size: 3.1rem;
      }
      .tagline {
        font-size: 1.05rem;
        letter-spacing: 2px;
      }
      .about h2 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <img 
      src="hero.jpg" 
      alt="Jovial Moons" 
      class="hero-image"
    >
    <div class="hero-overlay"></div>
    
    <div class="hero-content">
      <h1 class="logo">Jovial Moons</h1>
      <p class="tagline">Celestial • Timeless • Yours</p>
    </div>
  </section>

  <section class="section about">
    <h2>Under the same sky.</h2>
    <p>
      Jovial Moons captures moments of quiet wonder — 
      crafted objects and experiences that connect you to the night above.
    </p>
  </section>

  <footer class="footer">
    © Jovial Moons
  </footer>

  <script>
    // Reveal text once the web fonts have loaded so users never see the
    // fallback-to-webfont swap. Fall back to a timeout if the Font Loading
    // API is unavailable or slow, so text always appears.
    (function () {
      var reveal = function () { document.body.classList.add('fonts-ready'); };
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(reveal);
        setTimeout(reveal, 1500);
      } else {
        reveal();
      }
    })();
  </script>
</body>
</html>
